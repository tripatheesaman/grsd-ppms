services:
  db:
    image: mysql:8.4
    env_file:
      - ./.env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - /srv/grsd-ppms/db:/var/lib/mysql
    networks:
      - ppms_network
    ports:
      - "3309:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    image: tripatheesaman/grsd-ppms:latest
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../config/.env.production
    volumes:
      - /srv/grsd-ppms/uploads:/data/uploads
      - /srv/grsd-ppms/logs:/app/logs
    ports:
      - "127.0.0.1:3007:3000"
    networks:
      - ppms_network
    restart: unless-stopped

networks:
  ppms_network:
    driver: bridge
